sonar.sourceEncoding=UTF-8
sonar.sources=src,backend/app

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.docker-tmp/**,\
  **/.gcloud-tmp/**,\
  **/.tmp/**,\
  **/.secrets/**,\
  **/.venv/**,\
  **/.venv313/**,\
  **/.deps/**,\
  **/.pip-tmp/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  src/assets/**,\
  src/App-test.jsx

sonar.coverage.exclusions=\
  src/**,\
  backend/app/**

sonar.cpd.exclusions=\
  src/index.css

sonar.python.version=3.12
