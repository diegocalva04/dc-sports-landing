name: Deploy FastAPI Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-fastapi-aws.yml
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  FUNCTION_NAME: dc-sports-fastapi-backend
  ROLE_NAME: dc-sports-fastapi-lambda-role
  FRONTEND_ORIGIN: https://dc-sports-landing-esvbzutesq-uc.a.run.app
  FRONTEND_STABLE_ORIGIN: https://dc-sports-landing-458217573676.us-central1.run.app

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY GitHub Actions secret."
            exit 1
          fi

      - name: Create Lambda role if needed
        run: |
          set -euo pipefail

          if ! aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
            cat > trust-policy.json <<'JSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "lambda.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
          JSON

            aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document file://trust-policy.json

            aws iam attach-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

            sleep 20
          fi

      - name: Package backend
        run: |
          set -euo pipefail
          rm -rf build lambda.zip
          mkdir build
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt --target build
          cp -r backend/app build/app
          cd build
          zip -r ../lambda.zip .

      - name: Deploy Lambda
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::$ACCOUNT_ID:role/$ROLE_NAME"

          if aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://lambda.zip

            aws lambda wait function-updated --function-name "$FUNCTION_NAME"

            aws lambda update-function-configuration \
              --function-name "$FUNCTION_NAME" \
              --runtime python3.12 \
              --handler app.main.handler \
              --timeout 15 \
              --memory-size 256 \
              --environment "Variables={SUPABASE_URL=$SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY}"
          else
            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --runtime python3.12 \
              --handler app.main.handler \
              --role "$ROLE_ARN" \
              --zip-file fileb://lambda.zip \
              --timeout 15 \
              --memory-size 256 \
              --environment "Variables={SUPABASE_URL=$SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY}"

            aws lambda wait function-active --function-name "$FUNCTION_NAME"
          fi

      - name: Ensure public function URL
        run: |
          set -euo pipefail

          cat > function-url-cors.json <<JSON
          {
            "AllowOrigins": [
              "$FRONTEND_ORIGIN",
              "$FRONTEND_STABLE_ORIGIN"
            ],
            "AllowMethods": [
              "GET",
              "POST"
            ],
            "AllowHeaders": [
              "content-type"
            ],
            "MaxAge": 86400
          }
          JSON

          if ! aws lambda get-function-url-config --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
            aws lambda create-function-url-config \
              --function-name "$FUNCTION_NAME" \
              --auth-type NONE \
              --cors file://function-url-cors.json
          else
            aws lambda update-function-url-config \
              --function-name "$FUNCTION_NAME" \
              --auth-type NONE \
              --cors file://function-url-cors.json
          fi

          aws lambda remove-permission \
            --function-name "$FUNCTION_NAME" \
            --statement-id FunctionUrlPublicAccess >/dev/null 2>&1 || true

          aws lambda add-permission \
            --function-name "$FUNCTION_NAME" \
            --statement-id FunctionUrlPublicAccess \
            --action lambda:InvokeFunctionUrl \
            --principal "*" \
            --function-url-auth-type NONE >/dev/null 2>&1 || true

          aws lambda remove-permission \
            --function-name "$FUNCTION_NAME" \
            --statement-id FunctionUrlPublicInvokeAccess >/dev/null 2>&1 || true

          aws lambda add-permission \
            --function-name "$FUNCTION_NAME" \
            --statement-id FunctionUrlPublicInvokeAccess \
            --action lambda:InvokeFunction \
            --principal "*" \
            --invoked-via-function-url >/dev/null 2>&1 || true

          aws lambda get-function-url-config \
            --function-name "$FUNCTION_NAME" \
            --query FunctionUrl \
            --output text
